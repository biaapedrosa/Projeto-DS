server {
    listen 80;

    # Frontend (React/Vite) - path passed as-is, Vite has base: '/nutricao/'
    # O dev server do Vite já faz o SPA fallback (serve index.html para rotas do cliente),
    # então não é necessário um @spa_fallback aqui.
    location /nutricao/ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Redireciona /nutricao pra /nutricao/
    location = /nutricao {
        return 301 /nutricao/;
    }
}